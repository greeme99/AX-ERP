services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: standard_erp
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp_local_dev
    ports:
      - "5433:5432"
    volumes:
      - erp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d standard_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  # v5: 앱 컨테이너화(task-plan-v5.md). `docker compose up`만으로 앱+DB가 함께 기동한다.
  # 기존 SQLite 로컬 실행(pip install + uvicorn)은 그대로 유지 — compose는 PostgreSQL 포함
  # 완전한 환경이 필요할 때 쓰는 옵션이다.
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://erp:erp_local_dev@postgres:5432/standard_erp
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  erp_pgdata:
